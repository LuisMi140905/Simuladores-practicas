<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MagnetoSim 3D - UNAM Final Pro</title>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(10px); 
            padding: 20px; border-radius: 15px; width: 340px; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-height: 85vh; overflow-y: auto;
        }
        h3 { margin: 0 0 15px 0; color: #a3e635; font-weight: 300; letter-spacing: 1px; }
        .control { margin-bottom: 15px; }
        label { display: block; font-size: 0.8em; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: #a3e635; }
        button { 
            width: 100%; padding: 10px; background: #a3e635; border: none; color: #1e293b; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; 
        }
        button:hover { background: #d9f99d; transform: translateY(-1px); }
        .val { float: right; color: #facc15; font-family: monospace; text-transform: none; }
        #data-panel { 
            margin-top: 15px; background: #0f172a; padding: 10px; border-radius: 8px; 
            border: 2px solid #334155; text-align: center; 
        }
        .panel-title { font-size: 0.7em; color: #a3e635; margin-bottom: 5px; text-transform: uppercase; }
        .panel-value { font-size: 1.8em; color: #4ade80; font-family: 'Courier New', monospace; font-weight: bold; }
        
        #watermark {
            position: absolute; bottom: 20px; right: 20px; z-index: 100;
            text-align: right; color: #a3e635; font-size: 0.85em; font-weight: 300; 
            letter-spacing: 1px; pointer-events: none; opacity: 0.9;
        }

        /* Ajustes UI Celular Vertical (Portrait) */
        @media (max-width: 600px) and (orientation: portrait) {
            #ui { 
                width: 88%; max-width: 400px; 
                left: 50%; transform: translateX(-50%); 
                top: auto; bottom: 20px; /* Panel abajo para usar con pulgares */
                padding: 25px; 
            }
            h3 { font-size: 1.4em; margin-bottom: 20px; text-align: center; }
            .control { margin-bottom: 20px; }
            label { font-size: 1.05em; margin-bottom: 10px; }
            .val { font-size: 1.1em; }
            input[type="range"] { height: 15px; } /* Área táctil más grande */
            button { padding: 15px; font-size: 1.1em; margin-top: 5px; }
            #data-panel { margin-top: 20px; padding: 15px; }
            .panel-title { font-size: 0.9em; }
            .panel-value { font-size: 2.3em; }
            
            #watermark { 
                top: 20px; bottom: auto; /* Sube la marca de agua para no chocar */
            }
        }

        /* Ajustes UI Celular Horizontal (Landscape) */
        @media (max-height: 500px) and (orientation: landscape) {
            #ui { width: 280px; top: 10px; left: 10px; padding: 10px 15px; max-height: 90vh; }
            h3 { font-size: 1em; margin-bottom: 5px; }
            .control { margin-bottom: 5px; }
            label { margin-bottom: 2px; font-size: 0.7em; }
            button { padding: 5px; font-size: 0.9em; }
            #data-panel { margin-top: 5px; padding: 5px; }
            .panel-value { font-size: 1.4em; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Práctica 10: Magnetismo</h3>
        
        <div class="control">
            <label>Corriente (I) <span class="val" id="txtI">0.0 [A]</span></label>
            <input type="range" id="sliderI" min="0" max="5" step="0.1" value="0">
        </div>

        <div class="control">
            <label>Longitud (L) <span class="val" id="txtL">8 [cm]</span></label>
            <input type="range" id="sliderL" min="0.04" max="0.15" step="0.01" value="0.08">
        </div>

        <div class="control">
            <label>Magnitud del campo magnético (B) <span class="val" id="txtB">0.50 [T]</span></label>
            <input type="range" id="sliderB" min="0.1" max="1.0" step="0.05" value="0.5">
        </div>

        <button id="btnPol">INVERTIR SENTIDO DE LA CORRIENTE</button>

        <div id="data-panel">
            <div class="panel-title">Fuerza Magnética</div>
            <div class="panel-value" id="txtF">0.0000 [N]</div>
        </div>
    </div>

    <div id="watermark">
        Derechos Reservados<br>
        Facultad de Ingeniería, UNAM
    </div>

    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, cable, arrowF;
        let valI = 0.0, valL = 0.08, valB = 0.5, polaridad = 1;
        let particles = [], bArrows = [];
        
        let magnetBaseN, magnetBaseS, magnetPoloN, magnetPoloS; 
        let wireGeoLeft, wireGeoRight, wireLineLeft, wireLineRight;
        let matWirePos, matWireNeg;

        let screenCtx, screenTexture;
        let btnUp, btnDown;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        let globalParticleOffset = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 7, 12); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.DirectionalLight(0xffffff, 3);
            light.position.set(5, 10, 5);
            scene.add(light);

            const matRed = new THREE.MeshStandardMaterial({color: 0xef4444, metalness: 0.6});
            const matBlue = new THREE.MeshStandardMaterial({color: 0x074799, metalness: 0.7});

            const magnetGroup = new THREE.Group();
            magnetBaseN = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 1.2), matRed);
            magnetBaseN.position.set(0, 1, -2.1);
            magnetBaseS = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 1.2), matBlue);
            magnetBaseS.position.set(0, -1, -2.1);
            magnetPoloN = new THREE.Mesh(new THREE.BoxGeometry(6, 0.8, 4.5), matRed);
            magnetPoloN.position.set(0, 1.6, -0.25);
            magnetPoloS = new THREE.Mesh(new THREE.BoxGeometry(6, 0.8, 4.5), matBlue);
            magnetPoloS.position.set(0, -1.6, -0.25);
            
            magnetGroup.add(magnetBaseN, magnetBaseS, magnetPoloN, magnetPoloS);
            scene.add(magnetGroup);

            for(let i=0; i<400; i++) {
                let arr = new THREE.ArrowHelper(new THREE.Vector3(0,-1,0), new THREE.Vector3(0,0,0), 2.4, 0x60a5fa, 0.4, 0.2);
                arr.visible = false;
                scene.add(arr);
                bArrows.push(arr);
            }

            const cableGeo = new THREE.CylinderGeometry(0.2, 0.2, 1, 32);
            cableGeo.rotateZ(Math.PI / 2);
            cable = new THREE.Mesh(cableGeo, new THREE.MeshStandardMaterial({color: 0xb87333, metalness: 0.9, transparent: true, opacity: 0.65}));
            scene.add(cable);

            const canvas = document.createElement('canvas');
            canvas.width = 512; 
            canvas.height = 256;
            screenCtx = canvas.getContext('2d');
            screenTexture = new THREE.CanvasTexture(canvas);

            const psGroup = new THREE.Group();
            psGroup.position.set(0, -3.5, 3); 
            
            const psBox = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.5, 2), new THREE.MeshStandardMaterial({color: 0x1e293b, roughness: 0.8}));
            
            const psScreen = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 1), new THREE.MeshBasicMaterial({map: screenTexture}));
            psScreen.position.set(-0.4, 0.1, 1.01); 

            btnUp = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.1), new THREE.MeshStandardMaterial({color: 0x4ade80}));
            btnUp.rotation.x = Math.PI/2; btnUp.position.set(1.2, 0.35, 1.05);
            btnUp.userData = { isButton: true, action: 'up' }; 

            btnDown = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.1), new THREE.MeshStandardMaterial({color: 0xef4444}));
            btnDown.rotation.x = Math.PI/2; btnDown.position.set(1.2, -0.15, 1.05);
            btnDown.userData = { isButton: true, action: 'down' };
            
            psGroup.add(psBox, psScreen, btnUp, btnDown);
            scene.add(psGroup);

            matWirePos = new THREE.LineBasicMaterial({ color: 0xef4444, linewidth: 2 });
            matWireNeg = new THREE.LineBasicMaterial({ color: 0x64748b, linewidth: 2 });
            
            wireGeoLeft = new THREE.BufferGeometry();
            wireGeoRight = new THREE.BufferGeometry();
            wireLineLeft = new THREE.Line(wireGeoLeft, matWirePos);
            wireLineRight = new THREE.Line(wireGeoRight, matWireNeg);
            scene.add(wireLineLeft);
            scene.add(wireLineRight);

            const pGeo = new THREE.ConeGeometry(0.065, 0.45, 8); pGeo.rotateZ(-Math.PI/2);
            const pMat = new THREE.MeshBasicMaterial({color: 0xfacc15});
            for(let i = 0; i < 15; i++) {
                let p = new THREE.Mesh(pGeo, pMat); p.visible = false;
                scene.add(p);
                particles.push({ mesh: p, offset: 0 });
            }

            arrowF = new THREE.ArrowHelper(new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,0), 1, 0x4ade80, 0.6, 0.25);
            scene.add(arrowF);

            window.addEventListener('resize', onWindowResize, false);

            setupEvents();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function drawScreen() {
            screenCtx.fillStyle = '#0f172a';
            screenCtx.fillRect(0, 0, 512, 256);
            
            screenCtx.strokeStyle = '#334155';
            screenCtx.lineWidth = 10;
            screenCtx.strokeRect(5, 5, 502, 246);

            screenCtx.fillStyle = '#4ade80'; 
            screenCtx.font = 'bold 100px Courier New';
            screenCtx.textAlign = 'center';
            screenCtx.textBaseline = 'middle';
            
            const displayI = Math.abs(valI);
            screenCtx.fillText(`${displayI.toFixed(1)} [A]`, 256, 128);
            
            screenTexture.needsUpdate = true; 
        }

        function setupEvents() {
            const sI = document.getElementById('sliderI');
            const sL = document.getElementById('sliderL');
            const sB = document.getElementById('sliderB');
            const bP = document.getElementById('btnPol');

            const updateData = () => {
                valI = parseFloat(sI.value);
                valL = parseFloat(sL.value);
                valB = parseFloat(sB.value);
                
                document.getElementById('txtI').innerText = `${valI.toFixed(1)} [A]`;
                document.getElementById('txtL').innerText = `${(valL*100).toFixed(0)} [cm]`;
                document.getElementById('txtB').innerText = `${valB.toFixed(2)} [T]`;
                document.getElementById('txtF').innerText = `${(valI * valL * valB).toFixed(4)} [N]`;
                
                const currentL = valL * 38;
                cable.scale.x = currentL; 

                const geoBase = magnetBaseN.geometry;
                const geoPolo = magnetPoloN.geometry;
                magnetBaseN.geometry = new THREE.BoxGeometry(currentL, 2, 1.2);
                magnetBaseS.geometry = new THREE.BoxGeometry(currentL, 2, 1.2);
                magnetPoloN.geometry = new THREE.BoxGeometry(currentL, 0.8, 4.5);
                magnetPoloS.geometry = new THREE.BoxGeometry(currentL, 0.8, 4.5);
                if (geoBase) geoBase.dispose();
                if (geoPolo) geoPolo.dispose();

                const valB_norm = (valB - 0.1) / 0.9;
                const numX = Math.round(1.5 + (valL * 100) / 6) + Math.floor(valB_norm * 4);
                const numZ = 2 + Math.floor(valB_norm * 3);
                let arrowIdx = 0;

                const spanX = currentL / numX;
                const spanZ = 2.8 / numZ;

                for(let i=0; i<numX; i++) {
                    for(let j=0; j<numZ; j++) {
                        if (arrowIdx < bArrows.length) {
                            let posX = -currentL/2 + spanX/2 + i * spanX;
                            let posZ = -1.2 + spanZ/2 + j * spanZ;
                            bArrows[arrowIdx].position.set(posX, 1.2, posZ);
                            bArrows[arrowIdx].visible = true;
                            arrowIdx++;
                        }
                    }
                }

                for(let i=arrowIdx; i<bArrows.length; i++) {
                    bArrows[i].visible = false;
                }

                const endX = currentL / 2;
                const ptsL = [ new THREE.Vector3(-endX, 0, 0), new THREE.Vector3(-endX, -2.5, 0), new THREE.Vector3(-1, -3.9, 4.05) ];
                wireGeoLeft.setFromPoints(ptsL);

                const ptsR = [ new THREE.Vector3(endX, 0, 0), new THREE.Vector3(endX, -2.5, 0), new THREE.Vector3(1, -3.9, 4.05) ];
                wireGeoRight.setFromPoints(ptsR);

                if (polaridad > 0) {
                    wireLineLeft.material = matWirePos;  
                    wireLineRight.material = matWireNeg; 
                } else {
                    wireLineLeft.material = matWireNeg;  
                    wireLineRight.material = matWirePos; 
                }

                drawScreen();
            };

            sI.addEventListener('input', updateData);
            sL.addEventListener('input', updateData);
            sB.addEventListener('input', updateData);
            bP.addEventListener('click', () => { polaridad *= -1; updateData(); });

            window.addEventListener('pointerdown', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);

                const intersects = raycaster.intersectObjects([btnUp, btnDown]);

                if (intersects.length > 0) {
                    const action = intersects[0].object.userData.action;
                    if (action === 'up' && valI < 5.0) {
                        valI = Math.min(valI + 0.1, 5.0);
                    } else if (action === 'down' && valI > 0.0) {
                        valI = Math.max(valI - 0.1, 0.0);
                    }
                    sI.value = valI;
                    updateData();
                }
            });
            
            updateData();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            const currentL = valL * 38;
            const speed = valI * 0.0015 * polaridad;
            
            globalParticleOffset += speed;
            if (globalParticleOffset > 1) globalParticleOffset -= 1;
            if (globalParticleOffset < 0) globalParticleOffset += 1;

            const maxParticles = Math.max(3, Math.floor((valL / 0.15) * 10));
            const spacing = 1.0 / maxParticles;

            particles.forEach((p, index) => {
                if (valI > 0 && index < maxParticles) {
                    p.mesh.visible = true;
                    let pOffset = (globalParticleOffset + index * spacing) % 1.0;
                    p.mesh.position.set((pOffset - 0.5) * currentL, 0, 0);
                    p.mesh.rotation.y = polaridad > 0 ? 0 : Math.PI;
                } else {
                    p.mesh.visible = false;
                }
            });

            const maxForce = 5.0 * 0.15 * 1.0; 
            const dirZ = polaridad > 0 ? -1 : 1;
            arrowF.setDirection(new THREE.Vector3(0, 0, dirZ));
            
            if (valI * valL * valB === 0) {
                arrowF.setLength(0.001);
            } else {
                const normalizedMagnitudeSum = (valI / 5.0) + ((valL - 0.04) / 0.11) + ((valB - 0.1) / 0.9);
                arrowF.setLength(4.0 + (3.5 / 3.0) * normalizedMagnitudeSum);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
